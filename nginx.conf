# Serves the built Tmuxpert SPA. Client-side view state means any unknown path
# should fall back to index.html rather than 404.
server {
    listen       80;
    listen  [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    gzip            on;
    gzip_types      text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Fingerprinted assets (Vite adds a content hash) can be cached forever.
    location /assets/ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    # Everything else falls back to the app shell.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
