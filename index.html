<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./tmux-logo.svg" />
    <link rel="apple-touch-icon" href="./tmux-logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b0d14" />
    <meta name="color-scheme" content="dark" />

    <title>TmuxLegends — Learn tmux by Playing | Free Gamified tmux Trainer</title>
    <meta
      name="description"
      content="Learn tmux by playing. TmuxLegends is a free, gamified tmux trainer: real prefix-key challenges over a live pane/window/session model, XP, boss fights, a touch-friendly quiz mode, and arcade drills. Works 100% offline."
    />
    <meta
      name="keywords"
      content="tmux, learn tmux, tmux trainer, tmux tutorial, tmux game, tmux cheatsheet, terminal multiplexer, tmux prefix, tmux panes, tmux windows, tmux sessions, copy mode, developer tools, keyboard shortcuts"
    />
    <meta name="author" content="Zeecka" />
    <meta name="robots" content="index, follow" />
    <meta name="application-name" content="TmuxLegends" />
    <!-- Canonical / social URLs default to the GitHub Pages address; change these
         two (and public/sitemap.xml) if you deploy under your own domain. -->
    <link rel="canonical" href="https://zeecka.github.io/TmuxLegends/" />

    <!-- Open Graph (Facebook, LinkedIn, Discord, Slack…) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="TmuxLegends" />
    <meta property="og:title" content="TmuxLegends — Learn tmux by Playing" />
    <meta
      property="og:description"
      content="A free, gamified tmux trainer with real prefix-key challenges, boss fights, a mobile quiz, and arcade drills — over a real tmux simulator."
    />
    <meta property="og:url" content="https://zeecka.github.io/TmuxLegends/" />
    <meta property="og:image" content="https://raw.githubusercontent.com/Zeecka/TmuxLegends/main/docs/media/home.png" />
    <meta property="og:image:alt" content="TmuxLegends — the interactive tmux surface, a goal, and your Hero Muxie" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TmuxLegends — Learn tmux by Playing" />
    <meta
      name="twitter:description"
      content="A free, gamified tmux trainer with real prefix-key challenges, boss fights, a mobile quiz, and arcade drills."
    />
    <meta name="twitter:image" content="https://raw.githubusercontent.com/Zeecka/TmuxLegends/main/docs/media/home.png" />

    <!-- iOS add-to-home-screen -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TmuxLegends" />

    <!-- Structured data — helps search engines show this as a free web game. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "VideoGame",
        "name": "TmuxLegends",
        "alternateName": "Learn tmux by Playing",
        "url": "https://zeecka.github.io/TmuxLegends/",
        "description": "A free, gamified tmux trainer with real prefix-key challenges, boss fights, a touch-friendly quiz mode, and arcade drills — driven by a real in-browser tmux simulator.",
        "image": "https://raw.githubusercontent.com/Zeecka/TmuxLegends/main/docs/media/home.png",
        "applicationCategory": "GameApplication",
        "genre": ["Educational", "Typing"],
        "operatingSystem": "Web browser",
        "inLanguage": "en",
        "author": { "@type": "Person", "name": "Zeecka" },
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
      }
    </script>

    <!-- Fonts are self-hosted (bundled via @fontsource) so the app works offline. -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
